<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sambung Kata Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#fff;
height:100vh;
display:flex;
flex-direction:column;
}

.top{
padding:12px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

h1{
margin:0;
font-size:18px;
}

.info{
font-size:12px;
color:#94a3b8;
}

.mode{
display:flex;
background:#0f172a;
border-radius:10px;
padding:3px;
margin-bottom:8px;
}

.mode button{
flex:1;
padding:6px;
font-size:12px;
border:none;
background:transparent;
color:#94a3b8;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.mode button.active{
background:#22c55e;
color:#fff;
}

.input-group{
display:flex;
gap:6px;
}

input{
flex:1;
padding:8px;
font-size:13px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.08);
background:#0f172a;
color:#fff;
outline:none;
}

input:focus{
border-color:#22c55e;
}

button.search{
padding:8px 10px;
font-size:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:#fff;
font-weight:600;
cursor:pointer;
}

.result{
flex:1;
overflow-y:auto;
padding:8px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(70px,max-content));
justify-content:start;
gap:8px;
align-content:start;
}

.word{
min-width:70px;
padding:0 10px;
height:30px;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
border-radius:8px;
cursor:pointer;
font-size:11px;
border:1px solid rgba(255,255,255,0.05);
white-space:nowrap;
}
.word:active{
background:#22c55e;
}

.result::-webkit-scrollbar{
width:4px;
}

.result::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:10px;
}
</style>
</head>
<body>

<div class="top">

<div class="header">
<h1>Sambung Kata</h1>
<div class="info" id="info">0 kata</div>
</div>

<div class="mode">
<button id="modeAwal" class="active" onclick="setMode('awal')">Awalan</button>
<button id="modeAkhir" onclick="setMode('akhir')">Akhiran</button>
</div>

<div class="input-group">
<input type="text" id="huruf" maxlength="2" placeholder="1 atau 2 huruf">
<button class="search" onclick="cari()">Cari</button>
</div>

</div>

<div class="result" id="result"></div>

<script>
let database=[]
let mode='awal'
let hasil=[]

fetch('kbbi.json')
.then(res=>res.json())
.then(data=>{
database=data
})

function setMode(m){
mode=m
document.getElementById('modeAwal').classList.remove('active')
document.getElementById('modeAkhir').classList.remove('active')
if(m==='awal'){
document.getElementById('modeAwal').classList.add('active')
}else{
document.getElementById('modeAkhir').classList.add('active')
}
}

function lowerBound(arr,target){
let l=0,r=arr.length
while(l<r){
let mid=(l+r)>>1
if(arr[mid]<target)l=mid+1
else r=mid
}
return l
}

function cari(){
let input=document.getElementById('huruf').value.toLowerCase().trim()
if(input.length<1)return

if(mode==='awal'){
let start=lowerBound(database,input)
let end=lowerBound(database,input+"zz")
hasil=database.slice(start,end)
}else{
hasil=database.filter(k=>k.endsWith(input))
}

render()
}

function render(){
let resultDiv=document.getElementById('result')
resultDiv.innerHTML=''
let fragment=document.createDocumentFragment()

hasil.forEach(k=>{
let div=document.createElement('div')
div.className='word'
div.textContent=k
div.onclick=()=>navigator.clipboard.writeText(k)
fragment.appendChild(div)
})

resultDiv.appendChild(fragment)
document.getElementById('info').textContent=hasil.length+' kata'
}

document.getElementById('huruf').addEventListener('keypress',function(e){
if(e.key==='Enter')cari()
})
</script>

</body>
</html>
