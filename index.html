<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sambung Kata - Yudx</title>
<link rel="icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="kbbi_enc.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111318;--border:rgba(255,255,255,0.07);--green:#f97316;--red:#ff3d57;--muted:#3a4a5c;--text:#e2eaf4;--subtext:#556070;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Plus Jakarta Sans',sans-serif;background-color:var(--bg);background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px);background-size:60px 60px;color:var(--text);display:flex;flex-direction:column;}
.top{padding:14px 14px 10px;background:#1c1e21;border-bottom:1px solid var(--border);flex-shrink:0;}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
h1{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:#fff;line-height:1;margin-bottom:5px;}
.dev-tag{font-size:10px;font-weight:700;margin-top:1px;letter-spacing:0.3px;color:var(--subtext);display:block;line-height:1;}
.dev-link{color:var(--green);text-decoration:none;font-weight:700;}
.dev-link:hover{text-decoration:underline;}
.info-block{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.info{font-size:12px;color:#cbd5e1;font-weight:600;}
.info-total{font-size:10px;color:#8ba3be;font-weight:600;overflow:hidden;max-height:0;opacity:0;transform:translateY(-6px);transition:max-height 0.35s ease,opacity 0.3s ease 0.1s,transform 0.3s ease 0.1s;}
.info-total.visible{max-height:20px;opacity:1;transform:translateY(0);}
.mode{display:flex;background:rgba(10,10,11,0.6);border-radius:8px;padding:3px;margin-bottom:10px;gap:3px;}
.mode button{flex:1;padding:7px;font-size:13px;font-weight:700;border:none;background:transparent;color:#94a3b8;border-radius:6px;cursor:pointer;transition:all 0.15s;}
.mode button.active{background:var(--green);color:#fff;}
input{width:100%;padding:9px 12px;font-size:16px;font-weight:700;border-radius:8px;border:1px solid var(--border);background:rgba(10,10,11,0.6);color:#fff;outline:none;}
input:focus{border-color:var(--green);}
input:disabled{opacity:0.45;cursor:not-allowed;}
.loading-bar-wrap{height:2px;background:transparent;flex-shrink:0;overflow:hidden;}
.loading-bar{height:2px;width:0%;background:var(--green);transition:width 0.4s ease;}
.loading-bar.indeterminate{width:40%;animation:swing 1.2s ease-in-out infinite;}
@keyframes swing{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
.trending-wrap{flex-shrink:0;background:#1c1e21;border-bottom:1px solid var(--border);overflow:hidden;max-height:0;opacity:0;transition:max-height 0.35s ease,opacity 0.25s ease;}
.trending-wrap.visible{max-height:200px;opacity:1;}
.trending-inner{padding:8px 14px 10px;}
.trending-label{font-size:10px;font-weight:800;letter-spacing:0.8px;color:var(--subtext);text-transform:uppercase;margin-bottom:7px;}
.trending-chips{display:flex;flex-wrap:wrap;gap:5px;}
.trend-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:6px;font-size:12px;font-weight:800;color:#cbd5e1;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;transition:all 0.12s;user-select:none;}
.trend-chip:hover{background:rgba(249,115,22,0.09);border-color:rgba(249,115,22,0.3);color:var(--green);}
.trend-chip:active{transform:scale(0.92);}
.trend-chip.hot{background:rgba(255,61,87,0.07);border-color:rgba(255,61,87,0.2);color:#ff8fa3;}
.alpha-jump{display:none;flex-wrap:wrap;gap:5px;background:#1c1e21;flex-shrink:0;}
.alpha-jump.visible{display:flex;}
.alpha-jump.visible:not(:empty){padding:8px 14px;border-bottom:1px solid var(--border);}
.jump-btn{padding:6px 10px;font-size:12px;font-weight:800;border:1px solid rgba(255,255,255,0.1);border-radius:6px;background:rgba(10,10,11,0.6);color:#cbd5e1;cursor:pointer;transition:all 0.12s;line-height:1;}
.jump-btn:hover{background:rgba(249,115,22,0.12);border-color:rgba(249,115,22,0.35);color:var(--green);}
.jump-btn:active{transform:scale(0.93);}
.jump-btn.na{opacity:0.2;pointer-events:none;}
.result{flex:1;overflow-y:auto;min-height:0;padding-bottom:60px;}
.result::-webkit-scrollbar{width:3px;}
.result::-webkit-scrollbar-thumb{background:var(--muted);border-radius:10px;}
.empty{height:100%;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;font-size:14px;font-weight:600;gap:6px;}
.empty .material-icons-round{font-size:52px;opacity:0.45;}
.word-grid-awal{display:flex;flex-wrap:wrap;gap:5px;padding:9px 12px 12px;}
.awal-card{background:rgba(24,28,36,0.85);border:1px solid var(--border);border-radius:8px;padding:9px 14px;cursor:pointer;transition:background 0.1s,border-color 0.1s,transform 0.1s;display:inline-flex;align-items:center;user-select:none;}
.awal-card:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);}
.awal-card:active{transform:scale(0.95);}
.card-word{font-size:15px;font-weight:600;color:#e2eaf4;white-space:nowrap;line-height:1;}
.chip-prefix{color:var(--green);font-weight:800;}
.alpha-header-row{display:flex;align-items:center;gap:10px;padding:8px 14px 7px;background:rgba(249,115,22,0.05);border-top:2px solid rgba(249,115,22,0.25);border-bottom:1px solid rgba(249,115,22,0.1);}
.alpha-badge{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--green);border-radius:6px;font-size:13px;font-weight:800;color:#fff;box-shadow:0 0 8px rgba(249,115,22,0.3);flex-shrink:0;}
.word-row{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background 0.1s;user-select:none;}
.word-row:hover{background:rgba(255,255,255,0.03);}
.word-row:active{background:rgba(249,115,22,0.07);}
.word-num{font-size:11px;font-weight:700;color:var(--subtext);min-width:30px;text-align:right;flex-shrink:0;}
.word-text{font-size:14px;font-weight:600;color:#e2eaf4;}
.chip-suffix{color:var(--green);font-weight:800;}
.pg-bar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:4px;background:rgba(30,32,38,0.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:5px;box-shadow:0 4px 24px rgba(0,0,0,0.3);opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;z-index:100;}
.pg-bar.on{opacity:1;pointer-events:auto;}
.pg-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:none;border-radius:10px;background:transparent;color:#e2eaf4;font-size:20px;font-weight:900;cursor:pointer;transition:background 0.12s,color 0.12s,transform 0.1s;user-select:none;line-height:1;}
.pg-btn:hover{background:rgba(249,115,22,0.15);color:var(--green);}
.pg-btn:active{transform:scale(0.88);}
.pg-btn.dim{opacity:0.25;pointer-events:none;}
.pg-divider{width:1px;height:22px;background:rgba(255,255,255,0.1);flex-shrink:0;}
.pg-info{font-size:13px;font-weight:800;color:#94a3b8;padding:0 10px;white-space:nowrap;}
.pg-info b{color:#fff;}
.toast-container{position:fixed;bottom:16px;right:16px;z-index:9999;pointer-events:none;width:auto;max-width:90vw;display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.toast-roblox{pointer-events:auto;background:#2d1b1b;border:1px solid #5c2e2e;border-left:3px solid #d9534f;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.4);color:#f0d9d9;font-family:'Plus Jakarta Sans',sans-serif;min-width:260px;max-width:340px;padding:0;}
.toast-roblox .toast-header{background:transparent;border-bottom:1px solid #3d2222;padding:9px 12px 8px;color:#f0d9d9;font-size:12px;font-weight:700;}
.toast-roblox .toast-header .icon-roblox{width:16px;height:16px;border-radius:3px;background:#d9534f;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:900;margin-right:7px;flex-shrink:0;}
.toast-roblox .toast-header .me-auto{color:#f0d9d9;}
.toast-roblox .btn-close{filter:invert(1);opacity:0.5;width:10px;height:10px;}
.toast-roblox .toast-body{padding:9px 12px 11px;font-size:12px;color:#c9a8a8;font-weight:500;line-height:1.55;}
.toast-roblox .toast-body strong{color:#f0d9d9;font-weight:700;}
.toast-wa{pointer-events:auto;background:#0d2016;border:1px solid rgba(37,211,102,0.3);border-left:3px solid #25D366;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.4);font-family:'Plus Jakarta Sans',sans-serif;min-width:240px;max-width:300px;padding:0;}
.toast-wa .toast-header{background:transparent;border-bottom:1px solid rgba(37,211,102,0.15);padding:9px 12px 8px;color:#b7f5d0;font-size:12px;font-weight:700;}
.toast-wa .toast-header .icon-wa{width:16px;height:16px;border-radius:4px;background:#25D366;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#fff;margin-right:7px;flex-shrink:0;}
.toast-wa .toast-header .me-auto{color:#b7f5d0;}
.toast-wa .btn-close{filter:invert(1);opacity:0.4;width:10px;height:10px;}
.toast-wa .toast-body{padding:9px 12px 11px;font-size:12px;color:#7ecfa0;font-weight:500;line-height:1.55;}
.toast-wa .toast-body a{color:#4ade80;font-weight:700;text-decoration:none;}
.toast-wa .toast-body a:hover{text-decoration:underline;}
</style>
</head>
<body>

<div class="toast-container">
  <div id="toastRoblox" class="toast toast-roblox align-items-center" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="6000">
    <div class="toast-header">
      <span class="icon-roblox">!</span>
      <span class="me-auto">Warning</span>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body">
      note: tidak semua kata yang disini bisa dipakai di map roblox <strong>Sambung Kata</strong>
    </div>
  </div>
  <div id="toastWA" class="toast toast-wa align-items-center" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="8000">
    <div class="toast-header">
      <span class="icon-wa"><i class="fa-brands fa-whatsapp"></i></span>
      <span class="me-auto">Saluran WhatsApp</span>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body">
      Follow saluran WhatsApp untuk mendapatkan info terbaru! <a href="https://whatsapp.com/channel/0029Vb7dTNqGk1FzeHcvEs2N" target="_blank" rel="noopener">Klik di sini 🔔</a>
    </div>
  </div>
</div>

<div class="top">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="sambungkata.jpg" alt="logo" style="width:38px;height:38px;border-radius:8px;object-fit:cover;flex-shrink:0;">
      <div>
        <h1>Sambung Kata</h1>
        <div class="dev-tag">— by <a class="dev-link" href="https://tiktok.com/@_yudxx">@Yudx</a></div>
      </div>
    </div>
    <div class="info-block">
      <div class="info" id="info">memuat...</div>
      <div class="info-total" id="infoTotal"></div>
    </div>
  </div>
  <div class="mode">
    <button id="modeAwal" class="active" onclick="setMode('awal')">Awalan</button>
    <button id="modeAkhir" onclick="setMode('akhir')">Akhiran</button>
  </div>
  <input type="text" id="huruf" maxlength="3" placeholder="memuat kata..." autocomplete="off" disabled>
</div>

<div class="loading-bar-wrap" id="loadingWrap">
  <div class="loading-bar indeterminate" id="loadingBar"></div>
</div>

<div class="trending-wrap" id="trendingWrap">
  <div class="trending-inner">
    <div class="trending-label">🔥 Populer</div>
    <div class="trending-chips" id="trendingChips"></div>
  </div>
</div>

<div class="alpha-jump" id="alphaJump"></div>

<div class="result" id="result">
  <div class="empty">
    <span class="material-icons-round">hourglass_empty</span>
    sedang memuat kata...
  </div>
</div>

<div class="pg-bar" id="pgBar">
  <button class="pg-btn dim" id="pgFirst" onclick="goPage(1)" title="Pertama">&#171;</button>
  <button class="pg-btn dim" id="pgPrev" onclick="changePage(-1)">&#8249;</button>
  <div class="pg-divider"></div>
  <div class="pg-info" id="pgInfo"></div>
  <div class="pg-divider"></div>
  <button class="pg-btn dim" id="pgNext" onclick="changePage(1)">&#8250;</button>
  <button class="pg-btn dim" id="pgLast" onclick="goPageLast()" title="Terakhir">&#187;</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let database=[],mode='awal',hasil=[],lastInput='',dbReady=false
let TREND_AWAL=[],TREND_AKHIR=[],currentPage=1
const PAGE_SIZE=100

fetch('settings.json')
  .then(r=>r.json())
  .then(cfg=>{TREND_AWAL=cfg.trending_awal||[];TREND_AKHIR=cfg.trending_akhir||[];renderTrending()})
  .catch(()=>{TREND_AWAL=TREND_AKHIR=['ks','x','ax','ox','ex','ty','cy','ly','gy'];renderTrending()})

function showWAToast(){
  const el=document.getElementById('toastWA')
  const t=new bootstrap.Toast(el,{delay:8000})
  t.show()
  el.addEventListener('hidden.bs.toast',()=>{
    setTimeout(()=>showWAToast(),10000)
  },{once:true})
}

function renderTrending(){
  const wrap=document.getElementById('trendingWrap')
  if(document.getElementById('huruf').value.trim()){wrap.classList.remove('visible');return}
  const list=mode==='awal'?TREND_AWAL:TREND_AKHIR
  document.getElementById('trendingChips').innerHTML=list.map(item=>{
    const q=typeof item==='object'?item.q:item
    const hot=typeof item==='object'?!!item.hot:false
    return `<div class="trend-chip${hot?' hot':''}" onclick="applyTrend('${q}')">${q.toUpperCase()}${hot?' 🔥':''}</div>`
  }).join('')
  wrap.classList.add('visible')
}

function applyTrend(q){const inp=document.getElementById('huruf');inp.value=q;inp.focus();cari()}

const HR={'q':0,'x':1,'z':2,'y':3,'f':4,'v':5,'w':6,'g':7,'h':8,'j':9,'k':10,'b':11,'c':12,'d':13,'p':14,'t':15,'l':16,'m':17,'n':18,'r':19,'s':20,'u':21,'i':22,'e':23,'o':24,'a':25}
function getHardness(w){if(!w)return 99;const c=w[w.length-1].toLowerCase();return HR[c]!==undefined?HR[c]:99}

function lowerBound(arr,t){let l=0,r=arr.length;while(l<r){let m=(l+r)>>1;if(arr[m]<t)l=m+1;else r=m}return l}

function initDB(){
  const raw=window.__KBBI__
  if(!raw||!Array.isArray(raw)){document.getElementById('result').innerHTML='<div class="empty"><span class="material-icons-round">skull</span>gagal memuat database</div>';return}
  const wc=`self.onmessage=function(e){const db=[...new Set(e.data.map(k=>k.trim()).filter(k=>k.length>0))].sort();self.postMessage(db)}`
  const worker=new Worker(URL.createObjectURL(new Blob([wc],{type:'application/javascript'})))
  worker.postMessage(raw)
  worker.onmessage=function(e){
    database=e.data;dbReady=true;worker.terminate()
    try{delete window.__KBBI__}catch(err){}
    const bar=document.getElementById('loadingBar')
    bar.classList.remove('indeterminate');bar.style.width='100%'
    setTimeout(()=>{document.getElementById('loadingWrap').style.display='none'},400)
    const inp=document.getElementById('huruf');inp.disabled=false;inp.placeholder='ketik 1–3 huruf'
    document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
    document.getElementById('result').innerHTML='<div class="empty"><span class="material-icons-round">keyboard</span>mulai ketik huruf</div>'
    new bootstrap.Toast(document.getElementById('toastRoblox'),{delay:6000}).show()
    setTimeout(()=>showWAToast(),3000)
    renderTrending();cari()
  }
}
initDB()

function setMode(m){
  if(!dbReady)return
  mode=m
  document.getElementById('modeAwal').classList.toggle('active',m==='awal')
  document.getElementById('modeAkhir').classList.toggle('active',m==='akhir')
  renderTrending();cari()
}

function cari(){
  if(!dbReady)return
  const input=document.getElementById('huruf').value.toLowerCase().trim()
  lastInput=input;currentPage=1
  renderTrending()
  if(!input){
    document.getElementById('result').innerHTML='<div class="empty"><span class="material-icons-round">keyboard</span>mulai ketik huruf</div>'
    document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
    const t=document.getElementById('infoTotal');t.classList.remove('visible');setTimeout(()=>{t.textContent=''},350)
    document.getElementById('pgBar').classList.remove('on')
    document.getElementById('alphaJump').classList.remove('visible')
    return
  }
  if(mode==='awal'){
    hasil=database.slice(lowerBound(database,input),lowerBound(database,input+'zzz'))
    hasil.sort((a,b)=>getHardness(a)-getHardness(b))
    document.getElementById('alphaJump').classList.remove('visible')
    renderAwal()
  } else {
    hasil=database.filter(k=>k.endsWith(input))
    hasil.sort((a,b)=>a.localeCompare(b))
    renderAkhir()
  }
}

function showInfo(n){
  document.getElementById('info').textContent=n.toLocaleString()+' kata'
  const t=document.getElementById('infoTotal');t.textContent='total '+database.length.toLocaleString()+' kata'
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('visible')))
}

function updatePg(){
  const total=Math.ceil(hasil.length/PAGE_SIZE)
  const bar=document.getElementById('pgBar')
  if(total<=1){bar.classList.remove('on');return}
  bar.classList.add('on')
  document.getElementById('pgFirst').classList.toggle('dim',currentPage<=1)
  document.getElementById('pgPrev').classList.toggle('dim',currentPage<=1)
  document.getElementById('pgNext').classList.toggle('dim',currentPage>=total)
  document.getElementById('pgLast').classList.toggle('dim',currentPage>=total)
  document.getElementById('pgInfo').innerHTML=`<b>${currentPage}</b> / ${total}`
}

function goPage(n){
  currentPage=n
  if(mode==='awal')renderAwal();else renderAkhir()
  document.getElementById('result').scrollTop=0
}

function goPageLast(){
  goPage(Math.ceil(hasil.length/PAGE_SIZE))
}

function changePage(d){
  const total=Math.ceil(hasil.length/PAGE_SIZE)
  currentPage=Math.max(1,Math.min(total,currentPage+d))
  if(mode==='awal')renderAwal();else renderAkhir()
  document.getElementById('result').scrollTop=0
}

function slice(){const s=(currentPage-1)*PAGE_SIZE;return hasil.slice(s,s+PAGE_SIZE)}

function jumpToLetter(l,pg){
  currentPage=pg
  renderAkhir()
  document.getElementById('result').scrollTop=0
  requestAnimationFrame(()=>{
    const headers=document.getElementById('result').querySelectorAll('.alpha-header-row')
    for(const h of headers){
      if(h.querySelector('.alpha-badge').textContent.toLowerCase()===l){
        h.scrollIntoView({block:'start',behavior:'smooth'})
        break
      }
    }
  })
}

function buildAlphaJump(){
  const aj=document.getElementById('alphaJump')
  if(mode!=='akhir'||!hasil.length){aj.classList.remove('visible');aj.innerHTML='';return}
  const letterPage={}
  for(let i=0;i<hasil.length;i++){
    const l=hasil[i][0].toLowerCase()
    if(!(l in letterPage)) letterPage[l]=Math.ceil((i+1)/PAGE_SIZE)
  }
  aj.innerHTML='abcdefghijklmnopqrstuvwxyz'.split('').map(l=>{
    const pg=letterPage[l]
    return pg?`<button class="jump-btn" onclick="jumpToLetter('${l}',${pg})">${l.toUpperCase()}</button>`:''
  }).join('')
  aj.classList.add('visible')
}

function renderAwal(){
  showInfo(hasil.length);updatePg()
  const resultDiv=document.getElementById('result')
  if(!hasil.length){resultDiv.innerHTML='<div class="empty"><span class="material-icons-round">search_off</span>tidak ditemukan</div>';return}
  const page=slice()
  const offset=(currentPage-1)*PAGE_SIZE
  let html=''
  for(let i=0;i<page.length;i++){
    const k=page[i]
    html+=`<div class="word-row" onclick="navigator.clipboard.writeText('${k}')"><span class="word-num">${offset+i+1}</span><span class="word-text"><span class="chip-prefix">${k.slice(0,lastInput.length)}</span>${k.slice(lastInput.length)}</span></div>`
  }
  resultDiv.innerHTML=html
}

function renderAkhir(){
  showInfo(hasil.length);updatePg();buildAlphaJump()
  const resultDiv=document.getElementById('result')
  if(!hasil.length){resultDiv.innerHTML='<div class="empty"><span class="material-icons-round">search_off</span>tidak ditemukan</div>';return}
  const page=slice()
  const offset=(currentPage-1)*PAGE_SIZE
  let html=''
  let lastLetter=''
  for(let i=0;i<page.length;i++){
    const w=page[i],base=w.slice(0,-lastInput.length),tail=w.slice(-lastInput.length)
    const letter=w[0].toUpperCase()
    if(letter!==lastLetter){
      html+=`<div class="alpha-header-row"><span class="alpha-badge">${letter}</span></div>`
      lastLetter=letter
    }
    html+=`<div class="word-row" onclick="navigator.clipboard.writeText('${w}')"><span class="word-num">${offset+i+1}</span><span class="word-text">${base}<span class="chip-suffix">${tail}</span></span></div>`
  }
  resultDiv.innerHTML=html
}

document.getElementById('huruf').addEventListener('input',cari)
</script>
</body>
