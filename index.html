<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sambung Kata Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080e1a;
  --surface:#0f1825;
  --border:rgba(255,255,255,0.07);
  --green:#00e676;
  --red:#ff3d57;
  --orange:#ff8c00;
  --yellow:#ffd600;
  --muted:#3a4a5c;
  --text:#e2eaf4;
  --subtext:#556070;
}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.top{
  padding:14px 14px 10px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:10px;
}

h1{
  font-size:20px;
  font-weight:800;
  letter-spacing:-0.5px;
  color:#fff;
}

.dev-tag{
  font-size:10px;
  font-weight:700;
  margin-top:2px;
  letter-spacing:0.3px;
  color:var(--green);
  opacity:0.85;
}

.info-block{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:3px;
}

.info{
  font-size:12px;
  color:#cbd5e1;
  font-weight:600;
}

.info-total{
  font-size:10px;
  color:#8ba3be;
  font-weight:600;
  overflow:hidden;
  max-height:0;
  opacity:0;
  transform:translateY(-6px);
  transition:max-height 0.35s ease, opacity 0.3s ease 0.1s, transform 0.3s ease 0.1s;
}

.info-total.visible{
  max-height:20px;
  opacity:1;
  transform:translateY(0);
}

.mode{
  display:flex;
  background:var(--bg);
  border-radius:8px;
  padding:3px;
  margin-bottom:10px;
  gap:3px;
}

.mode button{
  flex:1;
  padding:7px;
  font-size:13px;
  font-weight:700;
  border:none;
  background:transparent;
  color:#94a3b8;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.15s;
}

.mode button.active{
  background:var(--green);
  color:#000;
}

input{
  width:100%;
  padding:9px 12px;
  font-size:16px;
  font-weight:700;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--bg);
  color:#fff;
  outline:none;
}

input:focus{ border-color:var(--green); }

.legend{
  display:flex;
  gap:12px;
  margin-top:8px;
  font-size:9px;
  color:var(--subtext);
  text-transform:uppercase;
}
.legend span{ display:flex; align-items:center; gap:4px; }
.dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dot.h1{ background:var(--red); }
.dot.h2{ background:var(--orange); }
.dot.h3{ background:var(--yellow); }

/* ===== AKHIRAN GRID ===== */
.akhir-grid-wrap{
  flex:1;
  overflow-y:auto;
  padding:10px 12px 80px;
}
.akhir-grid-wrap::-webkit-scrollbar{width:3px;}
.akhir-grid-wrap::-webkit-scrollbar-thumb{background:var(--muted);border-radius:10px;}

.az-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(72px,1fr));
  gap:7px;
}

.az-tile{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 6px 8px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  transition:border-color 0.15s, background 0.15s, transform 0.1s;
  user-select:none;
}
.az-tile:hover{
  border-color:rgba(0,230,118,0.35);
  background:rgba(0,230,118,0.05);
}
.az-tile:active{ transform:scale(0.95); }
.az-tile.active-tile{
  border-color:var(--green);
  background:rgba(0,230,118,0.08);
}
.az-tile .letter{
  font-size:20px;
  font-weight:800;
  color:#fff;
  line-height:1;
}
.az-tile .count{
  font-size:10px;
  font-weight:700;
  color:#556070;
  line-height:1;
}
.az-tile.has-words .count{ color:var(--green); }

/* ===== PANEL KATA ===== */
.kata-panel{
  margin-top:10px;
}
.kata-panel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:8px;
  padding:0 2px;
}
.kata-panel-header .title{
  font-size:13px;
  font-weight:700;
  color:#94a3b8;
}
.kata-panel-header .title strong{
  color:var(--green);
  font-size:15px;
}
.kata-panel-header .close-btn{
  background:none;
  border:none;
  color:#556070;
  font-size:18px;
  cursor:pointer;
  padding:0 4px;
  line-height:1;
  transition:color 0.15s;
}
.kata-panel-header .close-btn:hover{ color:#fff; }

.kata-list{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:5px;
}

.kata-chip{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:7px;
  padding:6px 10px;
  font-size:13px;
  font-weight:600;
  color:#e2eaf4;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  transition:background 0.1s, border-color 0.1s;
}
.kata-chip:hover{
  background:rgba(255,255,255,0.05);
  border-color:rgba(255,255,255,0.15);
}
.kata-chip .chip-last{
  font-size:10px;
  font-weight:700;
  padding:2px 5px;
  border-radius:4px;
  flex-shrink:0;
}
.kata-chip.h1 .chip-last{ background:rgba(255,61,87,0.15); color:var(--red); }
.kata-chip.h2 .chip-last{ background:rgba(255,140,0,0.15); color:var(--orange); }
.kata-chip.h3 .chip-last{ background:rgba(255,214,0,0.12); color:var(--yellow); }
.kata-chip.hn .chip-last{ background:rgba(255,255,255,0.04); color:var(--muted); }

/* ===== AWALAN MODE (original) ===== */
.result{
  flex:1;
  overflow-y:auto;
  padding:6px 0 80px;
}

.result::-webkit-scrollbar{ width:3px; }
.result::-webkit-scrollbar-thumb{ background:var(--muted); border-radius:10px; }

table{
  width:100%;
  border-collapse:collapse;
}

tr{
  cursor:pointer;
  transition:background 0.1s;
}

tr:hover{ background:rgba(255,255,255,0.03); }

td.num{
  width:52px;
  padding:11px 8px 11px 16px;
  font-size:12px;
  color:#7a8fa6;
  text-align:right;
  font-family:monospace;
  font-weight:700;
}

td.word{
  padding:11px 10px;
  font-size:15px;
  font-weight:600;
  color:#fff;
}

td.badge{
  padding:11px 16px 11px 4px;
  text-align:right;
}

.badge-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:28px;
  height:24px;
  border-radius:5px;
  font-size:12px;
  font-weight:700;
}

.h1 .badge-pill{ background:rgba(255,61,87,0.15); color:var(--red); }
.h2 .badge-pill{ background:rgba(255,140,0,0.15); color:var(--orange); }
.h3 .badge-pill{ background:rgba(255,214,0,0.12); color:var(--yellow); }
.hn .badge-pill{ background:rgba(255,255,255,0.04); color:var(--muted); }

tr.divider td{
  border-top:1px solid var(--border);
}

.empty{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  color:#94a3b8;
  font-size:14px;
  font-weight:600;
  gap:6px;
}
.empty-icon{ font-size:28px; opacity:0.3; }

.toast-container{
  position:fixed;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  z-index:9999;
  pointer-events:none;
  width:auto;
  max-width:90vw;
}

.toast-roblox{
  pointer-events:auto;
  background:#2d1b1b;
  border:1px solid #5c2e2e;
  border-left:3px solid #d9534f;
  border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,0.4);
  color:#f0d9d9;
  font-family:'Plus Jakarta Sans',sans-serif;
  min-width:260px;
  max-width:340px;
  padding:0;
}

.toast-roblox .toast-header{
  background:transparent;
  border-bottom:1px solid #3d2222;
  padding:9px 12px 8px;
  color:#f0d9d9;
  font-size:12px;
  font-weight:700;
}

.toast-roblox .toast-header .icon-roblox{
  width:16px;
  height:16px;
  border-radius:3px;
  background:#d9534f;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  color:#fff;
  font-weight:900;
  margin-right:7px;
  flex-shrink:0;
}

.toast-roblox .toast-header .me-auto{
  color:#f0d9d9;
}

.toast-roblox .btn-close{
  filter:invert(1);
  opacity:0.5;
  width:10px;
  height:10px;
}

.toast-roblox .toast-body{
  padding:9px 12px 11px;
  font-size:12px;
  color:#c9a8a8;
  font-weight:500;
  line-height:1.55;
}

.toast-roblox .toast-body strong{
  color:#f0d9d9;
  font-weight:700;
}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer">
  <div id="toastRoblox" class="toast toast-roblox align-items-center" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="6000">
    <div class="toast-header">
      <span class="icon-roblox">!</span>
      <span class="me-auto">Warning</span>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body">
      note: tidak semua kata yang disini masuk di map roblox <strong>Sambung Kata</strong>
    </div>
  </div>
</div>

<div class="top">
  <div class="header">
    <div>
      <h1>Sambung Kata</h1>
      <div class="dev-tag">— by Givy</div>
    </div>
    <div class="info-block">
      <div class="info" id="info">memuat...</div>
      <div class="info-total" id="infoTotal"></div>
    </div>
  </div>

  <div class="mode">
    <button id="modeAwal" class="active" onclick="setMode('awal')">Awalan</button>
    <button id="modeAkhir" onclick="setMode('akhir')">Akhiran</button>
  </div>

  <!-- Awalan: input biasa -->
  <div id="awalanInput">
    <input type="text" id="huruf" maxlength="3" placeholder="ketik 1–3 huruf" autocomplete="off">
    <div class="legend">
      <span><div class="dot h1"></div>Super susah</span>
      <span><div class="dot h2"></div>Susah</span>
      <span><div class="dot h3"></div>Lumayan</span>
    </div>
  </div>

  <!-- Akhiran: legend aja, grid di bawah -->
  <div id="akhiranLegend" style="display:none;">
    <div class="legend">
      <span><div class="dot h1"></div>Super susah</span>
      <span><div class="dot h2"></div>Susah</span>
      <span><div class="dot h3"></div>Lumayan</span>
    </div>
  </div>
</div>

<!-- Awalan result -->
<div class="result" id="result">
  <div class="empty"><div class="empty-icon">⌨</div>mulai ketik huruf</div>
</div>

<!-- Akhiran grid -->
<div class="akhir-grid-wrap" id="akhiranPanel" style="display:none;">
  <div class="az-grid" id="azGrid"></div>
  <div class="kata-panel" id="kataPanel" style="display:none;">
    <div class="kata-panel-header">
      <div class="title">Kata berakhiran <strong id="selectedLetter">-</strong></div>
      <button class="close-btn" onclick="closeKataPanel()">×</button>
    </div>
    <div class="kata-list" id="kataList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let database=[]
let mode='awal'
let hasil=[]
let selectedTileLetter=null
// precomputed: for each letter a-z, sorted words
let byEnding={}

const LETTERS='abcdefghijklmnopqrstuvwxyz'.split('')

const hardnessRank={
  'q':0,'x':1,'z':2,'y':3,
  'f':4,'v':5,'w':6,
  'g':7,'h':8,'j':9,
  'k':10,'b':11,'c':12,'d':13,
  'p':14,'t':15,'l':16,'m':17,
  'n':18,'r':19,'s':20,'u':21,
  'i':22,'e':23,'o':24,'a':25
}

function getHardness(word){
  if(!word) return 99
  const c=word[word.length-1].toLowerCase()
  return hardnessRank[c]!==undefined?hardnessRank[c]:99
}

function getHardKey(word){
  const h=getHardness(word)
  if(h<=3)return 'h1'
  if(h<=6)return 'h2'
  if(h<=9)return 'h3'
  return 'hn'
}

function lowerBound(arr,target){
  let l=0,r=arr.length
  while(l<r){let mid=(l+r)>>1;if(arr[mid]<target)l=mid+1;else r=mid}
  return l
}

function buildByEnding(){
  byEnding={}
  for(const l of LETTERS) byEnding[l]=[]
  for(const w of database){
    const last=w[w.length-1].toLowerCase()
    if(byEnding[last]) byEnding[last].push(w)
  }
  // sort by hardness of last char (all same), so sort alphabetically
  for(const l of LETTERS){
    byEnding[l].sort((a,b)=>a.localeCompare(b))
  }
}

function updateInfoTotal(){
  const totalEl=document.getElementById('infoTotal')
  if(database.length>0){
    totalEl.textContent='total '+database.length.toLocaleString()+' kata'
  }
}

fetch('kbbi.json')
.then(r=>r.json())
.then(data=>{
  database=[...new Set(data.map(k=>k.trim()).filter(k=>k.length>0))].sort()
  document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
  updateInfoTotal()
  buildByEnding()
  renderAzGrid()
  const el=document.getElementById('toastRoblox')
  const toast=new bootstrap.Toast(el,{delay:6000})
  toast.show()
})

function setMode(m){
  mode=m
  document.getElementById('modeAwal').classList.toggle('active',m==='awal')
  document.getElementById('modeAkhir').classList.toggle('active',m==='akhir')

  if(m==='awal'){
    document.getElementById('awalanInput').style.display=''
    document.getElementById('akhiranLegend').style.display='none'
    document.getElementById('result').style.display=''
    document.getElementById('akhiranPanel').style.display='none'
    document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
    const t=document.getElementById('infoTotal')
    t.classList.remove('visible')
    setTimeout(()=>{t.textContent=''},350)
    cari()
  }else{
    document.getElementById('awalanInput').style.display='none'
    document.getElementById('akhiranLegend').style.display=''
    document.getElementById('result').style.display='none'
    document.getElementById('akhiranPanel').style.display=''
    document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
    const t=document.getElementById('infoTotal')
    t.classList.remove('visible')
    setTimeout(()=>{t.textContent=''},350)
    selectedTileLetter=null
    document.getElementById('kataPanel').style.display='none'
  }
}

/* ===== AWALAN ===== */
function cari(){
  const input=document.getElementById('huruf').value.toLowerCase().trim()
  const resultDiv=document.getElementById('result')

  if(!input){
    resultDiv.innerHTML='<div class="empty"><div class="empty-icon">⌨</div>mulai ketik huruf</div>'
    document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
    const t=document.getElementById('infoTotal')
    t.classList.remove('visible')
    setTimeout(()=>{t.textContent=''},350)
    return
  }

  const start=lowerBound(database,input)
  const end=lowerBound(database,input+'zzz')
  hasil=database.slice(start,end)
  hasil.sort((a,b)=>getHardness(a)-getHardness(b))
  render()
}

function render(){
  const resultDiv=document.getElementById('result')
  const total=hasil.length
  document.getElementById('info').textContent=total.toLocaleString()+' kata'
  const t=document.getElementById('infoTotal')
  t.textContent='total '+database.length.toLocaleString()+' kata'
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('visible')))

  if(!total){
    resultDiv.innerHTML='<div class="empty"><div class="empty-icon">∅</div>tidak ditemukan</div>'
    return
  }

  const table=document.createElement('table')
  let rowsHtml=''

  for(let i=0;i<total;i++){
    const k=hasil[i]
    const hk=getHardKey(k)
    const lastChar=k[k.length-1].toUpperCase()
    const dividerClass=(i>0 && i%5===0)?'divider':''

    rowsHtml+=`
      <tr class="${dividerClass} ${hk}" onclick="navigator.clipboard.writeText('${k}')">
        <td class="num">${i+1}</td>
        <td class="word">${k}</td>
        <td class="badge ${hk}"><span class="badge-pill">${lastChar}</span></td>
      </tr>`
  }

  table.innerHTML=rowsHtml
  resultDiv.innerHTML=''
  resultDiv.appendChild(table)
}

/* ===== AKHIRAN GRID ===== */
function renderAzGrid(){
  const grid=document.getElementById('azGrid')
  grid.innerHTML=''
  for(const l of LETTERS){
    const count=(byEnding[l]||[]).length
    const tile=document.createElement('div')
    tile.className='az-tile'+(count>0?' has-words':'')
    tile.dataset.letter=l
    tile.innerHTML=`<div class="letter">${l.toUpperCase()}</div><div class="count">${count>0?count:'–'}</div>`
    if(count>0){
      tile.addEventListener('click',()=>selectLetter(l,tile))
    }
    grid.appendChild(tile)
  }
}

function selectLetter(l,tileEl){
  // toggle
  if(selectedTileLetter===l){
    closeKataPanel()
    return
  }
  selectedTileLetter=l

  // update active tile
  document.querySelectorAll('.az-tile').forEach(t=>t.classList.remove('active-tile'))
  tileEl.classList.add('active-tile')

  const words=byEnding[l]||[]
  // sort by hardness of the word (leading char difficulty) — actually let's sort alphabetically, user sees all
  const sorted=[...words].sort((a,b)=>a.localeCompare(b))

  document.getElementById('selectedLetter').textContent=l.toUpperCase()
  document.getElementById('info').textContent=sorted.length.toLocaleString()+' kata'
  const t=document.getElementById('infoTotal')
  t.textContent='total '+database.length.toLocaleString()+' kata'
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('visible')))

  const kataList=document.getElementById('kataList')
  let html=''
  for(const w of sorted){
    const hk=getHardKey(w)
    const lastChar=w[w.length-1].toUpperCase()
    html+=`<div class="kata-chip ${hk}" onclick="navigator.clipboard.writeText('${w}')">
      <span>${w}</span>
      <span class="chip-last">${lastChar}</span>
    </div>`
  }
  kataList.innerHTML=html

  const panel=document.getElementById('kataPanel')
  panel.style.display=''
  // scroll panel into view
  setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),50)
}

function closeKataPanel(){
  selectedTileLetter=null
  document.getElementById('kataPanel').style.display='none'
  document.querySelectorAll('.az-tile').forEach(t=>t.classList.remove('active-tile'))
  document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
  const t=document.getElementById('infoTotal')
  t.classList.remove('visible')
  setTimeout(()=>{t.textContent=''},350)
}

document.getElementById('huruf').addEventListener('input',cari)
</script>
</body>
</html>
