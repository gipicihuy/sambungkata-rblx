<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sambung Kata Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080e1a;
  --surface:#0f1825;
  --border:rgba(255,255,255,0.07);
  --green:#00e676;
  --red:#ff3d57;
  --orange:#ff8c00;
  --yellow:#ffd600;
  --muted:#3a4a5c;
  --text:#e2eaf4;
  --subtext:#556070;
}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.top{
  padding:14px 14px 10px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:10px;
}

h1{
  font-size:20px;
  font-weight:800;
  letter-spacing:-0.5px;
  color:#fff;
}

.info{
  font-size:12px;
  color:#cbd5e1;
  font-weight:600;
}

.mode{
  display:flex;
  background:var(--bg);
  border-radius:8px;
  padding:3px;
  margin-bottom:10px;
  gap:3px;
}

.mode button{
  flex:1;
  padding:7px;
  font-size:13px;
  font-weight:700;
  border:none;
  background:transparent;
  color:#94a3b8;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.15s;
}

.mode button.active{
  background:var(--green);
  color:#000;
}

input{
  width:100%;
  padding:9px 12px;
  font-size:16px;
  font-weight:700;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--bg);
  color:#fff;
  outline:none;
}

input:focus{ border-color:var(--green); }

.legend{
  display:flex;
  gap:12px;
  margin-top:8px;
  font-size:9px;
  color:var(--subtext);
  text-transform:uppercase;
}
.legend span{ display:flex; align-items:center; gap:4px; }
.dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dot.h1{ background:var(--red); }
.dot.h2{ background:var(--orange); }
.dot.h3{ background:var(--yellow); }

.result{
  flex:1;
  overflow-y:auto;
  padding:6px 0 80px;
}

.result::-webkit-scrollbar{ width:3px; }
.result::-webkit-scrollbar-thumb{ background:var(--muted); border-radius:10px; }

table{
  width:100%;
  border-collapse:collapse;
}

tr{
  cursor:pointer;
  transition:background 0.1s;
}

tr:hover{ background:rgba(255,255,255,0.03); }

td.num{
  width:50px;
  padding:9px 4px 9px 14px;
  font-size:13px;
  color:#7a8fa6;
  text-align:right;
  font-family:monospace;
  font-weight:700;
}

td.word{
  padding:9px 10px;
  font-size:15px;
  font-weight:600;
  color:#fff;
}

td.badge{
  padding:9px 14px 9px 4px;
  text-align:right;
}

.badge-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:26px;
  height:22px;
  border-radius:5px;
  font-size:12px;
  font-weight:700;
}

.h1 .badge-pill{ background:rgba(255,61,87,0.15); color:var(--red); }
.h2 .badge-pill{ background:rgba(255,140,0,0.15); color:var(--orange); }
.h3 .badge-pill{ background:rgba(255,214,0,0.12); color:var(--yellow); }
.hn .badge-pill{ background:rgba(255,255,255,0.04); color:var(--muted); }

tr.divider td{
  border-top:1px solid var(--border);
}

.empty{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  color:#94a3b8;
  font-size:14px;
  font-weight:600;
  gap:6px;
}
.empty-icon{ font-size:28px; opacity:0.3; }
</style>
</head>
<body>

<div class="top">
  <div class="header">
    <div>
      <h1>Sambung Kata</h1>
      <div style="font-size:10px;color:#556070;font-weight:600;margin-top:1px;">by Givy</div>
    </div>
    <div class="info" id="info">memuat...</div>
  </div>

  <div class="mode">
    <button id="modeAwal" class="active" onclick="setMode('awal')">Awalan</button>
    <button id="modeAkhir" onclick="setMode('akhir')">Akhiran</button>
  </div>

  <input type="text" id="huruf" maxlength="3" placeholder="ketik 1–3 huruf" autocomplete="off">

  <div class="legend">
    <span><div class="dot h1"></div>Super susah</span>
    <span><div class="dot h2"></div>Susah</span>
    <span><div class="dot h3"></div>Lumayan</span>
  </div>
</div>

<div class="result" id="result">
  <div class="empty"><div class="empty-icon">⌨</div>mulai ketik huruf</div>
</div>

<script>
let database=[]
let mode='awal'
let hasil=[]

const hardnessRank={
  'q':0,'x':1,'z':2,'y':3,
  'f':4,'v':5,'w':6,
  'g':7,'h':8,'j':9,
  'k':10,'b':11,'c':12,'d':13,
  'p':14,'t':15,'l':16,'m':17,
  'n':18,'r':19,'s':20,'u':21,
  'i':22,'e':23,'o':24,'a':25
}

function getHardness(word){
  if(!word) return 99
  const c=word[word.length-1].toLowerCase()
  return hardnessRank[c]!==undefined?hardnessRank[c]:99
}

function getHardKey(word){
  const h=getHardness(word)
  if(h<=3)return 'h1'
  if(h<=6)return 'h2'
  if(h<=9)return 'h3'
  return 'hn'
}

function lowerBound(arr,target){
  let l=0,r=arr.length
  while(l<r){let mid=(l+r)>>1;if(arr[mid]<target)l=mid+1;else r=mid}
  return l
}

fetch('kbbi.json')
.then(r=>r.json())
.then(data=>{
  // Membersihkan data: hapus spasi luar, hapus duplikat, hapus string kosong
  database=[...new Set(data.map(k=>k.trim()).filter(k=>k.length>0))].sort()
  document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
})

function setMode(m){
  mode=m
  document.getElementById('modeAwal').classList.toggle('active',m==='awal')
  document.getElementById('modeAkhir').classList.toggle('active',m==='akhir')
  cari()
}

function cari(){
  const input=document.getElementById('huruf').value.toLowerCase().trim()
  const resultDiv=document.getElementById('result')

  if(!input){
    resultDiv.innerHTML='<div class="empty"><div class="empty-icon">⌨</div>mulai ketik huruf</div>'
    document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
    return
  }

  if(mode==='awal'){
    const start=lowerBound(database,input)
    const end=lowerBound(database,input+'zzz')
    hasil=database.slice(start,end)
  }else{
    hasil=database.filter(k=>k.endsWith(input))
  }

  hasil.sort((a,b)=>getHardness(a)-getHardness(b))
  render()
}

function render(){
  const resultDiv=document.getElementById('result')
  const total=hasil.length
  document.getElementById('info').textContent=total.toLocaleString()+' kata'

  if(!total){
    resultDiv.innerHTML='<div class="empty"><div class="empty-icon">∅</div>tidak ditemukan</div>'
    return
  }

  const table=document.createElement('table')
  let rowsHtml=''

  for(let i=0; i<total; i++){
    const k=hasil[i]
    const hk=getHardKey(k)
    const lastChar=k[k.length-1].toUpperCase()
    const dividerClass=(i>0 && i%5===0)?'divider':''

    rowsHtml+=`
      <tr class="${dividerClass} ${hk}" onclick="navigator.clipboard.writeText('${k}')">
        <td class="num">${i+1}</td>
        <td class="word">${k}</td>
        <td class="badge ${hk}"><span class="badge-pill">${lastChar}</span></td>
      </tr>`
  }

  table.innerHTML=rowsHtml
  resultDiv.innerHTML=''
  resultDiv.appendChild(table)
}

document.getElementById('huruf').addEventListener('input',cari)
</script>
</body>
</html>
