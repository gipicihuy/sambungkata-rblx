<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#080e1a;--surface:#0f1825;--border:rgba(255,255,255,0.07);--green:#00e676;--red:#ff3d57;--orange:#ff8c00;--yellow:#ffd600;--muted:#3a4a5c;--text:#e2eaf4;--subtext:#556070}body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}.top{padding:14px 14px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}.header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}h1{font-size:20px;font-weight:800;letter-spacing:-.5px;color:#fff;line-height:1.1}.dev-tag{font-size:10px;font-weight:700;margin-top:0;letter-spacing:.3px;color:var(--subtext);display:block;line-height:1.4}.dev-link{color:var(--green);text-decoration:none;font-weight:700}.dev-link:hover{text-decoration:underline}.info-block{display:flex;flex-direction:column;align-items:flex-end;gap:3px}.info{font-size:12px;color:#cbd5e1;font-weight:600}.info-total{font-size:10px;color:#8ba3be;font-weight:600;max-height:0;opacity:0;transform:translateY(-6px);transition:max-height .35s ease,opacity .3s ease .1s,transform .3s ease .1s}.info-total.visible{max-height:20px;opacity:1;transform:translateY(0)}.mode{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:10px;gap:3px}.mode button{flex:1;padding:7px;font-size:13px;font-weight:700;border:none;background:transparent;color:#94a3b8;border-radius:6px;cursor:pointer;transition:all .15s}.mode button.active{background:var(--green);color:#000}input{width:100%;padding:9px 12px;font-size:16px;font-weight:700;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:#fff;outline:none}input:focus{border-color:var(--green)}input:disabled{opacity:.45;cursor:not-allowed}.result{flex:1;overflow-y:auto;padding:6px 0 80px;display:flex;flex-direction:column}.result::-webkit-scrollbar{width:3px}.result::-webkit-scrollbar-thumb{background:var(--muted);border-radius:10px}.loading-bar-wrap{height:2px;background:transparent;flex-shrink:0;overflow:hidden}.loading-bar{height:2px;width:0%;background:var(--green);transition:width .4s ease;box-shadow:0 0 8px rgba(0,230,118,.6)}.loading-bar.indeterminate{width:40%;animation:indeterminate 1.2s ease-in-out infinite}@keyframes indeterminate{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}.word-grid-awal{display:flex;flex-wrap:wrap;gap:5px;padding:9px 12px 12px}.awal-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 14px;cursor:pointer;transition:background .1s,border-color .1s,transform .1s;display:inline-flex;align-items:center;user-select:none}.awal-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15)}.awal-card:active{transform:scale(.95)}.awal-card .card-word{font-size:15px;font-weight:600;color:#e2eaf4;white-space:nowrap;line-height:1}.awal-card .card-word .chip-prefix{color:var(--green);font-weight:800}.alpha-section{padding:0 0 4px}.alpha-header{display:flex;align-items:center;gap:10px;padding:10px 14px 9px;background:rgba(0,230,118,.05);border-top:2px solid rgba(0,230,118,.25);border-bottom:1px solid rgba(0,230,118,.1)}.alpha-letter{font-size:15px;font-weight:800;color:#000;background:var(--green);border-radius:7px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:-.5px;box-shadow:0 0 10px rgba(0,230,118,.3)}.alpha-count{font-size:11px;color:var(--green);font-weight:700;margin-left:auto;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2);border-radius:5px;padding:2px 8px}.alpha-jump{display:none;flex-wrap:wrap;gap:6px;background:var(--surface);flex-shrink:0}.alpha-jump.visible{display:flex}.alpha-jump.visible:not(:empty){padding:10px 14px;border-bottom:1px solid var(--border)}.jump-btn{padding:7px 11px;font-size:13px;font-weight:800;border:1px solid rgba(255,255,255,.12);border-radius:7px;background:var(--bg);color:#cbd5e1;cursor:pointer;transition:all .12s;line-height:1}.jump-btn:hover{background:rgba(0,230,118,.12);border-color:rgba(0,230,118,.35);color:var(--green)}.jump-btn:active{transform:scale(.93)}.alpha-divider{height:1px;background:var(--border)}.word-grid{display:flex;flex-wrap:wrap;gap:5px;padding:9px 12px 12px}.word-chip{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:13px;font-weight:600;color:#e2eaf4;cursor:pointer;transition:background .1s,border-color .1s;display:flex;align-items:center;gap:0;user-select:none}.word-chip:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15)}.word-chip:active{transform:scale(.95)}.chip-suffix{color:var(--green);font-weight:800}.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;font-size:14px;font-weight:600;gap:6px}.empty-icon{font-size:28px;opacity:.3}.toast-container{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;max-width:90vw}.toast-roblox{pointer-events:auto;background:#2d1b1b;border:1px solid #5c2e2e;border-left:3px solid #d9534f;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.4);color:#f0d9d9;min-width:260px;max-width:340px}.toast-roblox .toast-header{background:transparent;border-bottom:1px solid #3d2222;padding:9px 12px 8px;color:#f0d9d9;font-size:12px;font-weight:700}.toast-roblox .toast-header .icon-roblox{width:16px;height:16px;border-radius:3px;background:#d9534f;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:900;margin-right:7px}.toast-roblox .toast-header .me-auto{color:#f0d9d9}.toast-roblox .btn-close{filter:invert(1);opacity:.5;width:10px;height:10px}.toast-roblox .toast-body{padding:9px 12px 11px;font-size:12px;color:#c9a8a8;font-weight:500;line-height:1.55}.toast-roblox .toast-body strong{color:#f0d9d9;font-weight:700}.trending-wrap{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);overflow:hidden;max-height:0;opacity:0;transition:max-height .35s ease,opacity .25s ease}.trending-wrap.visible{max-height:200px;opacity:1}.trending-inner{padding:8px 14px 10px}.trending-label{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:.8px;color:var(--subtext);text-transform:uppercase;margin-bottom:7px}.trending-label svg{opacity:.7}.trending-chips{display:flex;flex-wrap:wrap;gap:5px}.trend-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:6px;font-size:12px;font-weight:800;color:#cbd5e1;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:background .12s,border-color .12s,color .12s,transform .1s;user-select:none}.trend-chip:hover{background:rgba(0,230,118,.09);border-color:rgba(0,230,118,.3);color:var(--green)}.trend-chip:active{transform:scale(.92)}.trend-chip.hot{background:rgba(255,61,87,.07);border-color:rgba(255,61,87,.2);color:#ff8fa3}.trend-chip.hot:hover{background:rgba(255,61,87,.14);border-color:rgba(255,61,87,.4);color:var(--red)}
</style>

<body>
<div class="toast-container" id="toastContainer"><div id="toastRoblox" class="toast toast-roblox align-items-center" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="6000"><div class="toast-header"><span class="icon-roblox">!</span><span class="me-auto">Warning</span><button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button></div><div class="toast-body">note: tidak semua kata yang disini masuk di map roblox <strong>Sambung Kata</strong></div></div></div>
<div class="top"><div class="header"><div><h1>Sambung Kata</h1><div class="dev-tag">— by <a class="dev-link" href="https://tiktok.com/@gipii_">@Givy</a></div></div><div class="info-block"><div class="info" id="info">memuat...</div><div class="info-total" id="infoTotal"></div></div></div><div class="mode"><button id="modeAwal" class="active" onclick="setMode('awal')">Awalan</button><button id="modeAkhir" onclick="setMode('akhir')">Akhiran</button></div><input type="text" id="huruf" maxlength="3" placeholder="memuat kata..." autocomplete="off" disabled></div>
<div class="loading-bar-wrap" id="loadingWrap"><div class="loading-bar indeterminate" id="loadingBar"></div></div>
<div class="trending-wrap" id="trendingWrap"><div class="trending-inner"><div class="trending-label" id="trendingLabel"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 8L4 4.5L6.5 6.5L9 2" stroke="#00e676" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> populer dicari</div><div class="trending-chips" id="trendingChips"></div></div></div>
<div class="alpha-jump" id="alphaJump"></div>
<div class="result" id="result"><div class="empty"><div class="empty-icon">⏳</div>sedang memuat kata...</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let database=[],mode='awal',hasil=[],lastInput='',dbReady=!1,TREND_AWAL=[],TREND_AKHIR=[];fetch('settings.json').then(r=>r.json()).then(c=>{TREND_AWAL=c.trending_awal||[],TREND_AKHIR=c.trending_akhir||[],renderTrending()}).catch(()=>{TREND_AWAL=['ks','x','ax','ox','ex','ty','cy','ly','gy'],TREND_AKHIR=['ks','x','ax','ox','ex','ty','cy','ly','gy'],renderTrending()});function renderTrending(){const w=document.getElementById('trendingWrap'),c=document.getElementById('trendingChips'),l=document.getElementById('trendingLabel'),i=document.getElementById('huruf').value.trim();if(i){w.classList.remove('visible');return}const s=mode==='awal'?TREND_AWAL:TREND_AKHIR;l.innerHTML='🔥 Populer',c.innerHTML=s.map(t=>{const q=typeof t==='object'?t.q:t,h=typeof t==='object'?!!t.hot:!1;return `<div class="trend-chip${h?' hot':''}" onclick="applyTrend('${q}')">${q.toUpperCase()}${h?' 🔥':''}</div>`}).join(''),w.classList.add('visible')}function applyTrend(q){const i=document.getElementById('huruf');i.value=typeof q==='object'?q.q:q,i.focus(),cari()}const hardnessRank={q:0,x:1,z:2,y:3,f:4,v:5,w:6,g:7,h:8,j:9,k:10,b:11,c:12,d:13,p:14,t:15,l:16,m:17,n:18,r:19,s:20,u:21,i:22,e:23,o:24,a:25};function getHardness(w){if(!w)return 99;const c=w[w.length-1].toLowerCase();return hardnessRank[c]!==undefined?hardnessRank[c]:99}function getHardKey(w){const h=getHardness(w);return h<=3?'h1':h<=6?'h2':h<=9?'h3':'hn'}function lowerBound(a,t){let l=0,r=a.length;while(l<r){let m=(l+r)>>1;if(a[m]<t)l=m+1;else r=m}return l}function initDB(){const r=window.__KBBI__;if(!r||!Array.isArray(r)){document.getElementById('result').innerHTML='<div class="empty"><div class="empty-icon">💀</div>gagal memuat database</div>';return}const wc=`self.onmessage=function(e){const d=[...new Set(e.data.map(k=>k.trim()).filter(k=>k.length>0))].sort();self.postMessage(d)}`,b=new Blob([wc],{type:'application/javascript'}),u=URL.createObjectURL(b),w=new Worker(u);w.postMessage(r),w.onmessage=function(e){database=e.data,dbReady=!0,w.terminate(),URL.revokeObjectURL(u);try{delete window.__KBBI__}catch(err){}const bar=document.getElementById('loadingBar');bar.classList.remove('indeterminate'),bar.style.width='100%',setTimeout(()=>{document.getElementById('loadingWrap').style.display='none'},400);const i=document.getElementById('huruf');i.disabled=!1,i.placeholder='ketik 1–3 huruf',document.getElementById('info').textContent=database.length.toLocaleString()+' kata',document.getElementById('infoTotal').textContent='total '+database.length.toLocaleString()+' kata',document.getElementById('result').innerHTML='<div class="empty"><div class="empty-icon">⌨</div>mulai ketik huruf</div>',new bootstrap.Toast(document.getElementById('toastRoblox'),{delay:6000}).show(),renderTrending(),cari()}}initDB();function setMode(m){if(!dbReady)return;mode=m,document.getElementById('modeAwal').classList.toggle('active',m==='awal'),document.getElementById('modeAkhir').classList.toggle('active',m==='akhir');const aj=document.getElementById('alphaJump');if(m==='akhir')aj.classList.add('visible');else{aj.classList.remove('visible');aj.innerHTML=''}renderTrending(),cari()}function cari(){if(!dbReady)return;const i=document.getElementById('huruf').value.toLowerCase().trim();lastInput=i;const d=document.getElementById('result'),t=document.getElementById('infoTotal');renderTrending();if(!i){d.innerHTML='<div class="empty"><div class="empty-icon">⌨</div>mulai ketik huruf</div>',document.getElementById('info').textContent=database.length.toLocaleString()+' kata',t.classList.remove('visible'),setTimeout(()=>{t.textContent=''},350);return}if(mode==='awal'){const s=lowerBound(database,i),e=lowerBound(database,i+'zzz');hasil=database.slice(s,e),hasil.sort((a,b)=>getHardness(a)-getHardness(b)),renderGrid3()}else{hasil=database.filter(k=>k.endsWith(i)),hasil.sort((a,b)=>a.localeCompare(b)),renderGrid()}}function showInfo(c){document.getElementById('info').textContent=c.toLocaleString()+' kata';const t=document.getElementById('infoTotal');t.textContent='total '+database.length.toLocaleString()+' kata',requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('visible')))}function renderGrid3(){const r=document.getElementById('result');showInfo(hasil.length);if(!hasil.length){r.innerHTML='<div class="empty"><div class="empty-icon">∅</div>tidak ditemukan</div>';return}let h='<div class="word-grid-awal">';for(let i=0;i<hasil.length;i++){const k=hasil[i],hk=getHardKey(k),p=k.slice(0,lastInput.length),s=k.slice(lastInput.length);h+=`<div class="awal-card ${hk}" onclick="navigator.clipboard.writeText('${k}')"><div class="card-word"><span class="chip-prefix">${p}</span>${s}</div></div>`}h+='</div>',r.innerHTML=h}function renderGrid(){const r=document.getElementById('result');showInfo(hasil.length);if(!hasil.length){r.innerHTML='<div class="empty"><div class="empty-icon">∅</div>tidak ditemukan</div>',buildJumpBar({});return}const g={};for(const w of hasil){const f=w[0].toLowerCase();if(!g[f])g[f]=[];g[f].push(w)}const l=Object.keys(g).sort();let h='';for(let i=0;i<l.length;i++){const s=l[i],wds=g[s],c=wds.map(w=>{const hk=getHardKey(w),b=w.slice(0,-lastInput.length),t=w.slice(-lastInput.length);return `<div class="word-chip ${hk}" onclick="navigator.clipboard.writeText('${w}')">${b}<span class="chip-suffix">${t}</span></div>`}).join('');if(i>0)h+='<div class="alpha-divider"></div>';h+=`<div class="alpha-section" id="sec-${s}"><div class="alpha-header"><div class="alpha-letter">${s.toUpperCase()}</div><div class="alpha-count">${wds.length} kata</div></div><div class="word-grid">${c}</div></div>`}r.innerHTML=h,buildJumpBar(g)}function buildJumpBar(g){const aj=document.getElementById('alphaJump');aj.innerHTML='abcdefghijklmnopqrstuvwxyz'.split('').filter(l=>g[l]&&g[l].length>0).map(l=>`<button class="jump-btn" onclick="jumpTo('${l}')">${l.toUpperCase()}</button>`).join('')}function jumpTo(l){const e=document.getElementById('sec-'+l);if(!e)return;const r=document.getElementById('result'),fs=r.querySelector('.alpha-section');if(fs&&fs.id==='sec-'+l){r.scrollTo({top:0,behavior:'smooth'});return}const o=e.getBoundingClientRect().top-r.getBoundingClientRect().top+r.scrollTop;r.scrollTo({top:o,behavior:'smooth'})}document.getElementById('huruf').addEventListener('input',cari);
</script>
