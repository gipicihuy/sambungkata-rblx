<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sambung Kata - Yudx</title>
<link rel="icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="kbbi_enc.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111318;--surface:#161719;--border:rgba(255,255,255,0.07);
  --green:#f97316;--red:#ff3d57;--orange:#ff8c00;--yellow:#ffd600;
  --muted:#3a4a5c;--text:#e2eaf4;--subtext:#556070;
}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background-color:var(--bg);
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size:60px 60px;
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.top{padding:14px 14px 10px;background:#1c1e21;border-bottom:1px solid var(--border);flex-shrink:0;}

.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
h1{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:#fff;line-height:1;margin-bottom:5px;}
.dev-tag{font-size:10px;font-weight:700;margin-top:1px;letter-spacing:0.3px;color:var(--subtext);display:block;line-height:1;}
.dev-link{color:var(--green);text-decoration:none;font-weight:700;}
.dev-link:hover{text-decoration:underline;}
.info-block{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.info{font-size:12px;color:#cbd5e1;font-weight:600;}
.info-total{font-size:10px;color:#8ba3be;font-weight:600;overflow:hidden;max-height:0;opacity:0;transform:translateY(-6px);transition:max-height 0.35s ease,opacity 0.3s ease 0.1s,transform 0.3s ease 0.1s;}
.info-total.visible{max-height:20px;opacity:1;transform:translateY(0);}
.mode{display:flex;background:rgba(10,10,11,0.6);border-radius:8px;padding:3px;margin-bottom:10px;gap:3px;}
.mode button{flex:1;padding:7px;font-size:13px;font-weight:700;border:none;background:transparent;color:#94a3b8;border-radius:6px;cursor:pointer;transition:all 0.15s;}
.mode button.active{background:var(--green);color:#fff;}
input{width:100%;padding:9px 12px;font-size:16px;font-weight:700;border-radius:8px;border:1px solid var(--border);background:rgba(10,10,11,0.6);color:#fff;outline:none;}
input:focus{border-color:var(--green);}
input:disabled{opacity:0.45;cursor:not-allowed;}
.result{flex:1;overflow-y:auto;padding:6px 0 6px;display:flex;flex-direction:column;min-height:0;}
.result::-webkit-scrollbar{width:3px;}
.result::-webkit-scrollbar-thumb{background:var(--muted);border-radius:10px;}
.loading-bar-wrap{height:2px;background:transparent;flex-shrink:0;overflow:hidden;}
.loading-bar{height:2px;width:0%;background:var(--green);transition:width 0.4s ease;box-shadow:0 0 8px rgba(249,115,22,0.6);}
.loading-bar.indeterminate{width:40%;animation:indeterminate 1.2s ease-in-out infinite;}
@keyframes indeterminate{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
.word-grid-awal{display:flex;flex-wrap:wrap;gap:5px;padding:9px 12px 12px;}
.awal-card{background:rgba(24,28,36,0.85);border:1px solid var(--border);border-radius:8px;padding:9px 14px;cursor:pointer;transition:background 0.1s,border-color 0.1s,transform 0.1s;display:inline-flex;align-items:center;user-select:none;backdrop-filter:blur(4px);}
.awal-card:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);}
.awal-card:active{transform:scale(0.95);}
.awal-card .card-word{font-size:15px;font-weight:600;color:#e2eaf4;white-space:nowrap;line-height:1;}
.awal-card .card-word .chip-prefix{color:var(--green);font-weight:800;}
.alpha-section{padding:0 0 4px;}
.alpha-header{display:flex;align-items:center;gap:10px;padding:10px 14px 9px;background:rgba(249,115,22,0.05);border-top:2px solid rgba(249,115,22,0.25);border-bottom:1px solid rgba(249,115,22,0.1);}
.alpha-letter{font-size:15px;font-weight:800;color:#fff;background:var(--green);border-radius:7px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:-0.5px;box-shadow:0 0 10px rgba(249,115,22,0.3);}
.alpha-count{font-size:11px;color:var(--green);font-weight:700;margin-left:auto;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);border-radius:5px;padding:2px 8px;}
.alpha-jump{display:none;flex-wrap:wrap;gap:6px;background:#1c1e21;flex-shrink:0;}
.alpha-jump.visible{display:flex;}
.alpha-jump.visible:not(:empty){padding:10px 14px;border-bottom:1px solid var(--border);}
.jump-btn{padding:7px 11px;font-size:13px;font-weight:800;border:1px solid rgba(255,255,255,0.12);border-radius:7px;background:rgba(10,10,11,0.6);color:#cbd5e1;cursor:pointer;transition:all 0.12s;line-height:1;}
.jump-btn:hover{background:rgba(249,115,22,0.12);border-color:rgba(249,115,22,0.35);color:var(--green);}
.jump-btn:active{transform:scale(0.93);}
.alpha-divider{height:1px;background:var(--border);}
.word-grid{display:flex;flex-wrap:wrap;gap:5px;padding:9px 12px 12px;}
.word-chip{background:rgba(24,28,36,0.85);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:13px;font-weight:600;color:#e2eaf4;cursor:pointer;transition:background 0.1s,border-color 0.1s;display:flex;align-items:center;gap:0;user-select:none;}
.word-chip:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);}
.word-chip:active{transform:scale(0.95);}
.chip-suffix{color:var(--green);font-weight:800;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;font-size:14px;font-weight:600;gap:6px;}
.empty .material-icons-round{font-size:52px;opacity:0.45;color:#94a3b8;}
.toast-container{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;width:auto;max-width:90vw;}
.toast-roblox{pointer-events:auto;background:#2d1b1b;border:1px solid #5c2e2e;border-left:3px solid #d9534f;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.4);color:#f0d9d9;font-family:'Plus Jakarta Sans',sans-serif;min-width:260px;max-width:340px;padding:0;}
.toast-roblox .toast-header{background:transparent;border-bottom:1px solid #3d2222;padding:9px 12px 8px;color:#f0d9d9;font-size:12px;font-weight:700;}
.toast-roblox .toast-header .icon-roblox{width:16px;height:16px;border-radius:3px;background:#d9534f;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:900;margin-right:7px;flex-shrink:0;}
.toast-roblox .toast-header .me-auto{color:#f0d9d9;}
.toast-roblox .btn-close{filter:invert(1);opacity:0.5;width:10px;height:10px;}
.toast-roblox .toast-body{padding:9px 12px 11px;font-size:12px;color:#c9a8a8;font-weight:500;line-height:1.55;}
.toast-roblox .toast-body strong{color:#f0d9d9;font-weight:700;}
.trending-wrap{flex-shrink:0;background:#1c1e21;border-bottom:1px solid var(--border);overflow:hidden;max-height:0;opacity:0;transition:max-height 0.35s ease,opacity 0.25s ease;}
.trending-wrap.visible{max-height:200px;opacity:1;}
.trending-inner{padding:8px 14px 10px;}
.trending-label{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:0.8px;color:var(--subtext);text-transform:uppercase;margin-bottom:7px;}
.trending-label .material-icons-round{font-size:13px;color:var(--green);opacity:0.85;}
.trending-chips{display:flex;flex-wrap:wrap;gap:5px;}
.trend-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:6px;font-size:12px;font-weight:800;color:#cbd5e1;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;transition:background 0.12s,border-color 0.12s,color 0.12s,transform 0.1s;user-select:none;}
.trend-chip:hover{background:rgba(249,115,22,0.09);border-color:rgba(249,115,22,0.3);color:var(--green);}
.trend-chip:active{transform:scale(0.92);}
.trend-chip.hot{background:rgba(255,61,87,0.07);border-color:rgba(255,61,87,0.2);color:#ff8fa3;}
.trend-chip.hot:hover{background:rgba(255,61,87,0.14);border-color:rgba(255,61,87,0.4);color:var(--red);}

/* === PAGINATION === */
.pagination-bar{
  display:none;
  align-items:center;justify-content:center;gap:10px;
  padding:9px 14px;
  background:#1c1e21;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.pagination-bar.show{display:flex;}
.pg-btn{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;
  border:1px solid rgba(255,255,255,0.14);
  border-radius:9px;
  background:rgba(255,255,255,0.04);
  color:#e2eaf4;
  font-size:22px;
  font-weight:700;
  cursor:pointer;
  transition:background 0.12s,border-color 0.12s,color 0.12s,transform 0.1s;
  user-select:none;
  line-height:1;
}
.pg-btn:hover:not([disabled]){background:rgba(249,115,22,0.15);border-color:rgba(249,115,22,0.5);color:var(--green);}
.pg-btn:active:not([disabled]){transform:scale(0.88);}
.pg-btn[disabled]{opacity:0.2;cursor:not-allowed;}
.pg-info{font-size:12px;font-weight:700;color:#94a3b8;min-width:80px;text-align:center;letter-spacing:0.3px;}
.pg-info span{color:#fff;font-size:13px;}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer">
  <div id="toastRoblox" class="toast toast-roblox align-items-center" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="6000">
    <div class="toast-header">
      <span class="icon-roblox">!</span>
      <span class="me-auto">Warning</span>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body">
      note: tidak semua kata yang disini bisa dipakai di map roblox <strong>Sambung Kata</strong>
    </div>
  </div>
</div>

<div class="top">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="sambungkata.jpg" alt="logo" style="width:38px;height:38px;border-radius:8px;object-fit:cover;flex-shrink:0;">
      <div>
        <h1>Sambung Kata</h1>
        <div class="dev-tag">— by <a class="dev-link" href="https://tiktok.com/@_yudxx">@Yudx</a></div>
      </div>
    </div>
    <div class="info-block">
      <div class="info" id="info">memuat...</div>
      <div class="info-total" id="infoTotal"></div>
    </div>
  </div>
  <div class="mode">
    <button id="modeAwal" class="active" onclick="setMode('awal')">Awalan</button>
    <button id="modeAkhir" onclick="setMode('akhir')">Akhiran</button>
  </div>
  <input type="text" id="huruf" maxlength="3" placeholder="memuat kata..." autocomplete="off" disabled>
</div>

<div class="loading-bar-wrap" id="loadingWrap">
  <div class="loading-bar indeterminate" id="loadingBar"></div>
</div>

<div class="trending-wrap" id="trendingWrap">
  <div class="trending-inner">
    <div class="trending-label" id="trendingLabel">
      🔥 Populer
    </div>
    <div class="trending-chips" id="trendingChips"></div>
  </div>
</div>

<div class="alpha-jump" id="alphaJump"></div>
<div class="result" id="result">
  <div class="empty">
    <span class="material-icons-round">hourglass_empty</span>
    sedang memuat kata...
  </div>
</div>

<!-- Pagination bar -->
<div class="pagination-bar" id="paginationBar">
  <button class="pg-btn" id="pgPrev" onclick="changePage(-1)" title="Sebelumnya">&#8249;</button>
  <div class="pg-info" id="pgInfo"></div>
  <button class="pg-btn" id="pgNext" onclick="changePage(1)" title="Berikutnya">&#8250;</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let database=[]
let mode='awal'
let hasil=[]
let lastInput=''
let dbReady=false
let TREND_AWAL=[]
let TREND_AKHIR=[]
let currentPage=1
const PAGE_SIZE=100

fetch('settings.json')
  .then(r=>r.json())
  .then(cfg=>{
    TREND_AWAL=cfg.trending_awal||[]
    TREND_AKHIR=cfg.trending_akhir||[]
    renderTrending()
  })
  .catch(()=>{
    TREND_AWAL=['ks','x','ax','ox','ex','ty','cy','ly','gy']
    TREND_AKHIR=['ks','x','ax','ox','ex','ty','cy','ly','gy']
    renderTrending()
  })

function renderTrending(){
  const wrap=document.getElementById('trendingWrap')
  const chips=document.getElementById('trendingChips')
  const inp=document.getElementById('huruf').value.trim()
  if(inp){wrap.classList.remove('visible');return}
  const list=mode==='awal'?TREND_AWAL:TREND_AKHIR
  chips.innerHTML=list.map(item=>{
    const q=typeof item==='object'?item.q:item
    const hot=typeof item==='object'?!!item.hot:false
    return `<div class="trend-chip${hot?' hot':''}" onclick="applyTrend('${q}')">${q.toUpperCase()}${hot?' 🔥':''}</div>`
  }).join('')
  wrap.classList.add('visible')
}

function applyTrend(q){
  const inp=document.getElementById('huruf')
  inp.value=typeof q==='object'?q.q:q
  inp.focus()
  cari()
}

const hardnessRank={
  'q':0,'x':1,'z':2,'y':3,'f':4,'v':5,'w':6,
  'g':7,'h':8,'j':9,'k':10,'b':11,'c':12,'d':13,
  'p':14,'t':15,'l':16,'m':17,'n':18,'r':19,'s':20,
  'u':21,'i':22,'e':23,'o':24,'a':25
}

function getHardness(word){
  if(!word)return 99
  const c=word[word.length-1].toLowerCase()
  return hardnessRank[c]!==undefined?hardnessRank[c]:99
}

function getHardKey(word){
  const h=getHardness(word)
  if(h<=3)return 'h1'
  if(h<=6)return 'h2'
  if(h<=9)return 'h3'
  return 'hn'
}

function lowerBound(arr,target){
  let l=0,r=arr.length
  while(l<r){let mid=(l+r)>>1;if(arr[mid]<target)l=mid+1;else r=mid}
  return l
}

function initDB(){
  const raw = window.__KBBI__
  if(!raw || !Array.isArray(raw)){
    document.getElementById('result').innerHTML=
      '<div class="empty"><span class="material-icons-round">skull</span>gagal memuat database</div>'
    return
  }

  const workerCode=`
    self.onmessage=function(e){
      const db=[...new Set(e.data.map(k=>k.trim()).filter(k=>k.length>0))].sort()
      self.postMessage(db)
    }
  `
  const blob=new Blob([workerCode],{type:'application/javascript'})
  const url=URL.createObjectURL(blob)
  const worker=new Worker(url)
  worker.postMessage(raw)
  worker.onmessage=function(e){
    database=e.data
    dbReady=true
    worker.terminate()
    URL.revokeObjectURL(url)

    try{ delete window.__KBBI__ }catch(err){}

    const bar=document.getElementById('loadingBar')
    bar.classList.remove('indeterminate')
    bar.style.width='100%'
    setTimeout(()=>{document.getElementById('loadingWrap').style.display='none'},400)

    const inp=document.getElementById('huruf')
    inp.disabled=false
    inp.placeholder='ketik 1–3 huruf'
    document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
    document.getElementById('infoTotal').textContent='total '+database.length.toLocaleString()+' kata'
    document.getElementById('result').innerHTML='<div class="empty"><span class="material-icons-round">keyboard</span>mulai ketik huruf</div>'
    new bootstrap.Toast(document.getElementById('toastRoblox'),{delay:6000}).show()
    renderTrending()
    cari()
  }
}

initDB()

function setMode(m){
  if(!dbReady)return
  mode=m
  document.getElementById('modeAwal').classList.toggle('active',m==='awal')
  document.getElementById('modeAkhir').classList.toggle('active',m==='akhir')
  const aj=document.getElementById('alphaJump')
  if(m==='akhir')aj.classList.add('visible')
  else{aj.classList.remove('visible');aj.innerHTML=''}
  renderTrending()
  cari()
}

function cari(){
  if(!dbReady)return
  const input=document.getElementById('huruf').value.toLowerCase().trim()
  lastInput=input
  currentPage=1  // reset ke halaman 1 setiap cari baru
  const resultDiv=document.getElementById('result')
  const t=document.getElementById('infoTotal')
  renderTrending()
  if(!input){
    resultDiv.innerHTML='<div class="empty"><span class="material-icons-round">keyboard</span>mulai ketik huruf</div>'
    document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
    t.classList.remove('visible')
    setTimeout(()=>{t.textContent=''},350)
    hidePagination()
    return
  }
  if(mode==='awal'){
    const start=lowerBound(database,input)
    const end=lowerBound(database,input+'zzz')
    hasil=database.slice(start,end)
    hasil.sort((a,b)=>getHardness(a)-getHardness(b))
    renderGrid3()
  } else {
    hasil=database.filter(k=>k.endsWith(input))
    hasil.sort((a,b)=>a.localeCompare(b))
    renderGrid()
  }
}

function showInfo(count){
  document.getElementById('info').textContent=count.toLocaleString()+' kata'
  const t=document.getElementById('infoTotal')
  t.textContent='total '+database.length.toLocaleString()+' kata'
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('visible')))
}

function hidePagination(){
  document.getElementById('paginationBar').classList.remove('show')
}

function updatePagination(total){
  const totalPages=Math.ceil(total/PAGE_SIZE)
  const bar=document.getElementById('paginationBar')
  if(totalPages<=1){bar.classList.remove('show');return}
  bar.classList.add('show')
  const prev=document.getElementById('pgPrev')
  const next=document.getElementById('pgNext')
  if(currentPage<=1)prev.setAttribute('disabled','')
  else prev.removeAttribute('disabled')
  if(currentPage>=totalPages)next.setAttribute('disabled','')
  else next.removeAttribute('disabled')
  document.getElementById('pgInfo').innerHTML=`<span>${currentPage}</span> / ${totalPages}`
}

function changePage(dir){
  const totalPages=Math.ceil(hasil.length/PAGE_SIZE)
  currentPage=Math.max(1,Math.min(totalPages,currentPage+dir))
  if(mode==='awal') renderGrid3()
  else renderGrid()
  document.getElementById('result').scrollTo({top:0,behavior:'smooth'})
}

function getPageSlice(){
  const start=(currentPage-1)*PAGE_SIZE
  return hasil.slice(start,start+PAGE_SIZE)
}

function renderGrid3(){
  const resultDiv=document.getElementById('result')
  showInfo(hasil.length)
  updatePagination(hasil.length)
  if(!hasil.length){
    resultDiv.innerHTML='<div class="empty"><span class="material-icons-round">search_off</span>tidak ditemukan</div>'
    return
  }
  const page=getPageSlice()
  let html='<div class="word-grid-awal">'
  for(let i=0;i<page.length;i++){
    const k=page[i]
    const hk=getHardKey(k)
    const prefix=k.slice(0,lastInput.length)
    const rest=k.slice(lastInput.length)
    html+=`<div class="awal-card ${hk}" onclick="navigator.clipboard.writeText('${k}')"><div class="card-word"><span class="chip-prefix">${prefix}</span>${rest}</div></div>`
  }
  html+='</div>'
  resultDiv.innerHTML=html
}

function renderGrid(){
  const resultDiv=document.getElementById('result')
  showInfo(hasil.length)
  updatePagination(hasil.length)
  if(!hasil.length){
    resultDiv.innerHTML='<div class="empty"><span class="material-icons-round">search_off</span>tidak ditemukan</div>'
    buildJumpBar({})
    return
  }
  const page=getPageSlice()
  const groups={}
  for(const w of page){
    const first=w[0].toLowerCase()
    if(!groups[first])groups[first]=[]
    groups[first].push(w)
  }
  const letters=Object.keys(groups).sort()
  let html=''
  for(let li=0;li<letters.length;li++){
    const l=letters[li]
    const words=groups[l]
    const chips=words.map(w=>{
      const hk=getHardKey(w)
      const base=w.slice(0,-lastInput.length)
      const tail=w.slice(-lastInput.length)
      return `<div class="word-chip ${hk}" onclick="navigator.clipboard.writeText('${w}')">${base}<span class="chip-suffix">${tail}</span></div>`
    }).join('')
    if(li>0)html+='<div class="alpha-divider"></div>'
    html+=`<div class="alpha-section" id="sec-${l}"><div class="alpha-header"><div class="alpha-letter">${l.toUpperCase()}</div><div class="alpha-count">${words.length} kata</div></div><div class="word-grid">${chips}</div></div>`
  }
  resultDiv.innerHTML=html
  buildJumpBar(groups)
}

function buildJumpBar(groups){
  const aj=document.getElementById('alphaJump')
  aj.innerHTML='abcdefghijklmnopqrstuvwxyz'.split('')
    .filter(l=>groups[l]&&groups[l].length>0)
    .map(l=>`<button class="jump-btn" onclick="jumpTo('${l}')">${l.toUpperCase()}</button>`)
    .join('')
}

function jumpTo(l){
  const el=document.getElementById('sec-'+l)
  if(!el)return
  const resultDiv=document.getElementById('result')
  const firstSection=resultDiv.querySelector('.alpha-section')
  if(firstSection&&firstSection.id==='sec-'+l){resultDiv.scrollTo({top:0,behavior:'smooth'});return}
  const offset=el.getBoundingClientRect().top-resultDiv.getBoundingClientRect().top+resultDiv.scrollTop
  resultDiv.scrollTo({top:offset,behavior:'smooth'})
}

document.getElementById('huruf').addEventListener('input',cari)
</script>
