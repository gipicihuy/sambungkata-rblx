<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sambung Kata Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e1a;--surface:#0f1825;--border:rgba(255,255,255,0.07);
  --green:#00e676;--red:#ff3d57;--orange:#ff8c00;--yellow:#ffd600;
  --muted:#3a4a5c;--text:#e2eaf4;--subtext:#556070;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.top{padding:14px 14px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
h1{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:#fff;}
.dev-tag{font-size:10px;font-weight:700;margin-top:2px;letter-spacing:0.3px;color:var(--green);opacity:0.85;}
.info-block{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.info{font-size:12px;color:#cbd5e1;font-weight:600;}
.info-total{font-size:10px;color:#8ba3be;font-weight:600;overflow:hidden;max-height:0;opacity:0;transform:translateY(-6px);transition:max-height 0.35s ease,opacity 0.3s ease 0.1s,transform 0.3s ease 0.1s;}
.info-total.visible{max-height:20px;opacity:1;transform:translateY(0);}
.mode{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:10px;gap:3px;}
.mode button{flex:1;padding:7px;font-size:13px;font-weight:700;border:none;background:transparent;color:#94a3b8;border-radius:6px;cursor:pointer;transition:all 0.15s;}
.mode button.active{background:var(--green);color:#000;}
input{width:100%;padding:9px 12px;font-size:16px;font-weight:700;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:#fff;outline:none;}
input:focus{border-color:var(--green);}
.legend{display:flex;gap:12px;margin-top:8px;font-size:9px;color:var(--subtext);text-transform:uppercase;}
.legend span{display:flex;align-items:center;gap:4px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot.h1{background:var(--red);}.dot.h2{background:var(--orange);}.dot.h3{background:var(--yellow);}
.result{flex:1;overflow-y:auto;padding:6px 0 80px;}
.result::-webkit-scrollbar{width:3px;}
.result::-webkit-scrollbar-thumb{background:var(--muted);border-radius:10px;}

/* AWALAN table */
table{width:100%;border-collapse:collapse;}
tr{cursor:pointer;transition:background 0.1s;}
tr:hover{background:rgba(255,255,255,0.03);}
td.num{width:52px;padding:11px 8px 11px 16px;font-size:12px;color:#7a8fa6;text-align:right;font-family:monospace;font-weight:700;}
td.word{padding:11px 10px;font-size:15px;font-weight:600;color:#fff;}
td.badge{padding:11px 16px 11px 4px;text-align:right;}
.badge-pill{display:inline-flex;align-items:center;justify-content:center;width:28px;height:24px;border-radius:5px;font-size:12px;font-weight:700;}
.h1 .badge-pill{background:rgba(255,61,87,0.15);color:var(--red);}
.h2 .badge-pill{background:rgba(255,140,0,0.15);color:var(--orange);}
.h3 .badge-pill{background:rgba(255,214,0,0.12);color:var(--yellow);}
.hn .badge-pill{background:rgba(255,255,255,0.04);color:var(--muted);}
tr.divider td{border-top:1px solid var(--border);}

/* AKHIRAN grouped grid */
.alpha-section{padding:0 0 4px;}

/* === HEADER KELOMPOK HURUF — lebih gede & mencolok === */
.alpha-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px 9px;
  background:rgba(0,230,118,0.05);
  border-top:2px solid rgba(0,230,118,0.25);
  border-bottom:1px solid rgba(0,230,118,0.1);

}
.alpha-letter{
  font-size:15px;
  font-weight:800;
  color:#000;
  background:var(--green);
  border-radius:7px;
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  letter-spacing:-0.5px;
  box-shadow:0 0 10px rgba(0,230,118,0.3);
}
.alpha-label{
  font-size:14px;
  font-weight:800;
  color:#fff;
  letter-spacing:-0.3px;
}
.alpha-count{
  font-size:11px;
  color:var(--green);
  font-weight:700;
  margin-left:auto;
  background:rgba(0,230,118,0.1);
  border:1px solid rgba(0,230,118,0.2);
  border-radius:5px;
  padding:2px 8px;
}
/* ===================================================== */

.alpha-jump{display:none;flex-wrap:wrap;gap:6px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.alpha-jump.visible{display:flex;}
.jump-btn{padding:7px 11px;font-size:13px;font-weight:800;border:1px solid rgba(255,255,255,0.12);border-radius:7px;background:var(--bg);color:#cbd5e1;cursor:pointer;transition:all 0.12s;line-height:1;}
.jump-btn:hover{background:rgba(0,230,118,0.12);border-color:rgba(0,230,118,0.35);color:var(--green);}
.jump-btn:active{transform:scale(0.93);}
.alpha-divider{height:1px;background:var(--border);}
.word-grid{display:flex;flex-wrap:wrap;gap:5px;padding:9px 12px 12px;}
.word-chip{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:13px;font-weight:600;color:#e2eaf4;cursor:pointer;transition:background 0.1s,border-color 0.1s;display:flex;align-items:center;gap:0;user-select:none;}
.word-chip:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);}
.word-chip:active{transform:scale(0.95);}
.chip-suffix{color:var(--green);font-weight:800;}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#94a3b8;font-size:14px;font-weight:600;gap:6px;}
.empty-icon{font-size:28px;opacity:0.3;}

/* toast */
.toast-container{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;width:auto;max-width:90vw;}
.toast-roblox{pointer-events:auto;background:#2d1b1b;border:1px solid #5c2e2e;border-left:3px solid #d9534f;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.4);color:#f0d9d9;font-family:'Plus Jakarta Sans',sans-serif;min-width:260px;max-width:340px;padding:0;}
.toast-roblox .toast-header{background:transparent;border-bottom:1px solid #3d2222;padding:9px 12px 8px;color:#f0d9d9;font-size:12px;font-weight:700;}
.toast-roblox .toast-header .icon-roblox{width:16px;height:16px;border-radius:3px;background:#d9534f;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:900;margin-right:7px;flex-shrink:0;}
.toast-roblox .toast-header .me-auto{color:#f0d9d9;}
.toast-roblox .btn-close{filter:invert(1);opacity:0.5;width:10px;height:10px;}
.toast-roblox .toast-body{padding:9px 12px 11px;font-size:12px;color:#c9a8a8;font-weight:500;line-height:1.55;}
.toast-roblox .toast-body strong{color:#f0d9d9;font-weight:700;}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer">
  <div id="toastRoblox" class="toast toast-roblox align-items-center" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="6000">
    <div class="toast-header">
      <span class="icon-roblox">!</span>
      <span class="me-auto">Warning</span>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body">
      note: tidak semua kata yang disini masuk di map roblox <strong>Sambung Kata</strong>
    </div>
  </div>
</div>

<div class="top">
  <div class="header">
    <div>
      <h1>Sambung Kata</h1>
      <div class="dev-tag">— by Givy</div>
    </div>
    <div class="info-block">
      <div class="info" id="info">memuat...</div>
      <div class="info-total" id="infoTotal"></div>
    </div>
  </div>
  <div class="mode">
    <button id="modeAwal" class="active" onclick="setMode('awal')">Awalan</button>
    <button id="modeAkhir" onclick="setMode('akhir')">Akhiran</button>
  </div>
  <input type="text" id="huruf" maxlength="3" placeholder="ketik 1–3 huruf" autocomplete="off">
  <div class="legend" id="legend">
    <span><div class="dot h1"></div>Super susah</span>
    <span><div class="dot h2"></div>Susah</span>
    <span><div class="dot h3"></div>Lumayan</span>
  </div>
</div>

<div class="alpha-jump" id="alphaJump"></div>
<div class="result" id="result">
  <div class="empty"><div class="empty-icon">⌨</div>mulai ketik huruf</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let database=[]
let mode='awal'
let hasil=[]
let lastInput=''

const hardnessRank={
  'q':0,'x':1,'z':2,'y':3,'f':4,'v':5,'w':6,
  'g':7,'h':8,'j':9,'k':10,'b':11,'c':12,'d':13,
  'p':14,'t':15,'l':16,'m':17,'n':18,'r':19,'s':20,
  'u':21,'i':22,'e':23,'o':24,'a':25
}

function getHardness(word){
  if(!word)return 99
  const c=word[word.length-1].toLowerCase()
  return hardnessRank[c]!==undefined?hardnessRank[c]:99
}

function getHardKey(word){
  const h=getHardness(word)
  if(h<=3)return 'h1'
  if(h<=6)return 'h2'
  if(h<=9)return 'h3'
  return 'hn'
}

function lowerBound(arr,target){
  let l=0,r=arr.length
  while(l<r){let mid=(l+r)>>1;if(arr[mid]<target)l=mid+1;else r=mid}
  return l
}

fetch('kbbi.json')
.then(r=>r.json())
.then(data=>{
  database=[...new Set(data.map(k=>k.trim()).filter(k=>k.length>0))].sort()
  document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
  document.getElementById('infoTotal').textContent='total '+database.length.toLocaleString()+' kata'
  const el=document.getElementById('toastRoblox')
  new bootstrap.Toast(el,{delay:6000}).show()
  cari() // re-trigger in case user already typed
})

function setMode(m){
  mode=m
  document.getElementById('modeAwal').classList.toggle('active',m==='awal')
  document.getElementById('modeAkhir').classList.toggle('active',m==='akhir')
  document.getElementById('legend').style.display=m==='akhir'?'none':'flex'
  const aj=document.getElementById('alphaJump')
  if(m==='akhir') aj.classList.add('visible')
  else { aj.classList.remove('visible'); aj.innerHTML='' }
  cari()
}

function cari(){
  const input=document.getElementById('huruf').value.toLowerCase().trim()
  lastInput=input
  const resultDiv=document.getElementById('result')
  const t=document.getElementById('infoTotal')

  if(!input){
    resultDiv.innerHTML='<div class="empty"><div class="empty-icon">⌨</div>mulai ketik huruf</div>'
    document.getElementById('info').textContent=database.length.toLocaleString()+' kata'
    t.classList.remove('visible')
    setTimeout(()=>{t.textContent=''},350)
    return
  }

  if(mode==='awal'){
    const start=lowerBound(database,input)
    const end=lowerBound(database,input+'zzz')
    hasil=database.slice(start,end)
    hasil.sort((a,b)=>getHardness(a)-getHardness(b))
    renderTable()
  } else {
    hasil=database.filter(k=>k.endsWith(input))
    hasil.sort((a,b)=>a.localeCompare(b))
    renderGrid()
  }
}

function showInfo(count){
  document.getElementById('info').textContent=count.toLocaleString()+' kata'
  const t=document.getElementById('infoTotal')
  t.textContent='total '+database.length.toLocaleString()+' kata'
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('visible')))
}

/* AWALAN: list table */
function renderTable(){
  const resultDiv=document.getElementById('result')
  showInfo(hasil.length)
  if(!hasil.length){
    resultDiv.innerHTML='<div class="empty"><div class="empty-icon">∅</div>tidak ditemukan</div>'
    return
  }
  let html='<table>'
  for(let i=0;i<hasil.length;i++){
    const k=hasil[i]
    const hk=getHardKey(k)
    const last=k[k.length-1].toUpperCase()
    const div=i>0&&i%5===0?'divider':''
    html+=`<tr class="${div} ${hk}" onclick="navigator.clipboard.writeText('${k}')">
      <td class="num">${i+1}</td>
      <td class="word">${k}</td>
      <td class="badge ${hk}"><span class="badge-pill">${last}</span></td>
    </tr>`
  }
  html+='</table>'
  resultDiv.innerHTML=html
}

/* AKHIRAN: grouped by first letter */
function renderGrid(){
  const resultDiv=document.getElementById('result')
  showInfo(hasil.length)
  if(!hasil.length){
    resultDiv.innerHTML='<div class="empty"><div class="empty-icon">∅</div>tidak ditemukan</div>'
    buildJumpBar({})
    return
  }

  const groups={}
  for(const w of hasil){
    const first=w[0].toLowerCase()
    if(!groups[first])groups[first]=[]
    groups[first].push(w)
  }

  const letters=Object.keys(groups).sort()
  let html=''
  for(let li=0;li<letters.length;li++){
    const l=letters[li]
    const words=groups[l]
    const chips=words.map(w=>{
      const hk=getHardKey(w)
      const base=w.slice(0,-lastInput.length)
      const tail=w.slice(-lastInput.length)
      return `<div class="word-chip ${hk}" onclick="navigator.clipboard.writeText('${w}')">${base}<span class="chip-suffix">${tail}</span></div>`
    }).join('')

    if(li>0) html+='<div class="alpha-divider"></div>'
    html+=`<div class="alpha-section" id="sec-${l}">
      <div class="alpha-header">
        <div class="alpha-letter">${l.toUpperCase()}</div>
        <div class="alpha-count">${words.length} kata</div>
      </div>
      <div class="word-grid">${chips}</div>
    </div>`
  }

  resultDiv.innerHTML=html
  buildJumpBar(groups)
}

function buildJumpBar(groups){
  const all='abcdefghijklmnopqrstuvwxyz'.split('')
  const aj=document.getElementById('alphaJump')
  aj.innerHTML=all
    .filter(l=>groups[l]&&groups[l].length>0)
    .map(l=>`<button class="jump-btn" onclick="jumpTo('${l}')">${l.toUpperCase()}</button>`)
    .join('')
}

function jumpTo(l){
  const el=document.getElementById('sec-'+l)
  if(!el) return
  const resultDiv=document.getElementById('result')
  // cek apakah ini section pertama
  const firstSection=resultDiv.querySelector('.alpha-section')
  if(firstSection&&firstSection.id==='sec-'+l){
    resultDiv.scrollTo({top:0,behavior:'smooth'})
    return
  }
  const offset=el.getBoundingClientRect().top - resultDiv.getBoundingClientRect().top + resultDiv.scrollTop
  resultDiv.scrollTo({top:offset,behavior:'smooth'})
}

document.getElementById('huruf').addEventListener('input',cari)
</script>
</body>
</html>
